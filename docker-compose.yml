version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loftcommunity-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
      NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN:-localhost:3000}
      NEXT_PUBLIC_SCHEME: ${NEXT_PUBLIC_SCHEME:-http://}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:4000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@loftcommunity.com}
